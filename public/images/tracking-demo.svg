<!-- Demo Tracking Illustration SVG -->
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8963c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6a652;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a5e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Road -->
  <rect x="0" y="220" width="400" height="50" fill="#6c757d"/>
  <rect x="0" y="240" width="400" height="5" fill="#fff" opacity="0.3"/>
  
  <!-- Truck -->
  <g transform="translate(50, 180)">
    <!-- Truck body -->
    <rect x="0" y="20" width="60" height="25" rx="5" fill="url(#truckGradient)"/>
    <!-- Truck cabin -->
    <rect x="60" y="15" width="30" height="30" rx="5" fill="url(#truckGradient)"/>
    <!-- Wheels -->
    <circle cx="15" cy="50" r="8" fill="#343a40"/>
    <circle cx="75" cy="50" r="8" fill="#343a40"/>
    <circle cx="15" cy="50" r="5" fill="#6c757d"/>
    <circle cx="75" cy="50" r="5" fill="#6c757d"/>
    <!-- Window -->
    <rect x="65" y="20" width="20" height="15" rx="2" fill="#87ceeb"/>
  </g>
  
  <!-- Package on truck -->
  <rect x="65" y="185" width="20" height="20" rx="3" fill="url(#boxGradient)"/>
  <rect x="70" y="185" width="10" height="20" fill="none" stroke="#fff" stroke-width="2"/>
  <rect x="65" y="190" width="20" height="10" fill="none" stroke="#fff" stroke-width="2"/>
  
  <!-- Tracking path dots -->
  <circle cx="150" cy="200" r="4" fill="#d8963c"/>
  <circle cx="200" cy="200" r="4" fill="#a9d4e7"/>
  <circle cx="250" cy="200" r="4" fill="#6c757d" opacity="0.5"/>
  <circle cx="300" cy="200" r="4" fill="#6c757d" opacity="0.3"/>
  
  <!-- Connecting lines -->
  <line x1="154" y1="200" x2="196" y2="200" stroke="#d8963c" stroke-width="2"/>
  <line x1="204" y1="200" x2="246" y2="200" stroke="#a9d4e7" stroke-width="2"/>
  <line x1="254" y1="200" x2="296" y2="200" stroke="#dee2e6" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Destination -->
  <g transform="translate(320, 150)">
    <!-- House -->
    <rect x="0" y="30" width="40" height="30" fill="#28a745"/>
    <polygon points="0,30 20,10 40,30" fill="#dc3545"/>
    <!-- Door -->
    <rect x="15" y="45" width="10" height="15" fill="#6f4e37"/>
    <!-- Window -->
    <rect x="5" y="38" width="8" height="8" fill="#87ceeb"/>
  </g>
  
  <!-- Floating icons -->
  <g opacity="0.6">
    <!-- GPS icon -->
    <circle cx="180" cy="100" r="15" fill="none" stroke="#d8963c" stroke-width="2"/>
    <circle cx="180" cy="100" r="5" fill="#d8963c"/>
    
    <!-- Clock icon -->
    <circle cx="280" cy="80" r="12" fill="none" stroke="#a9d4e7" stroke-width="2"/>
    <line x1="280" y1="80" x2="280" y2="72" stroke="#a9d4e7" stroke-width="2"/>
    <line x1="280" y1="80" x2="285" y2="85" stroke="#a9d4e7" stroke-width="2"/>
  </g>
  
  <!-- Text labels -->
  <text x="150" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#6c757d">Picked Up</text>
  <text x="200" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#6c757d">In Transit</text>
  <text x="250" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#6c757d">Processing</text>
  <text x="300" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#6c757d">Delivered</text>
</svg>